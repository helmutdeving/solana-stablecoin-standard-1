version: "3.9"

services:
  # ─── Mint/Burn REST API ──────────────────────────────────────────────────────
  mint-burn:
    build:
      context: ./services/mint-burn
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SOLANA_RPC=${SOLANA_RPC:-https://api.devnet.solana.com}
      - KEYPAIR_PATH=/secrets/authority.json
      - MINT_ADDRESS=${MINT_ADDRESS}
    volumes:
      - ${HOME}/.config/solana:/secrets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Event Listener ──────────────────────────────────────────────────────────
  event-listener:
    build:
      context: ./services/event-listener
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - SOLANA_RPC_WS=${SOLANA_RPC_WS:-wss://api.devnet.solana.com}
      - PROGRAM_ID=${PROGRAM_ID:-SSSxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    restart: unless-stopped

  # ─── Compliance Module (SSS-2 only) ──────────────────────────────────────────
  compliance:
    build:
      context: ./services/compliance
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - SOLANA_RPC=${SOLANA_RPC:-https://api.devnet.solana.com}
      - KEYPAIR_PATH=/secrets/authority.json
      - MINT_ADDRESS=${MINT_ADDRESS}
    volumes:
      - ${HOME}/.config/solana:/secrets:ro
    restart: unless-stopped

  # ─── Admin Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - mint-burn
      - event-listener
      - compliance
    restart: unless-stopped

  # ─── Observability: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Observability: Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sss-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/sss-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
