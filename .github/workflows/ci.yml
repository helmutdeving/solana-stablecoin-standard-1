name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: TypeScript Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            packages/sdk/package.json
            packages/cli/package.json
            services/backend-api/package.json
            services/event-listener/package.json
            services/compliance/package.json
            tests/package.json

      - name: Install SDK deps
        run: npm ci
        working-directory: packages/sdk

      - name: Typecheck SDK
        run: npm run build
        working-directory: packages/sdk

      - name: Install CLI deps
        run: npm ci
        working-directory: packages/cli

      - name: Typecheck CLI
        run: npm run build
        working-directory: packages/cli

      - name: Install test deps
        run: npm ci
        working-directory: tests

      - name: Typecheck tests
        run: npx tsc --noEmit
        working-directory: tests

  test-sdk:
    name: SDK Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SDK deps
        run: npm ci
        working-directory: packages/sdk

      - name: Build SDK
        run: npm run build
        working-directory: packages/sdk

      - name: Install test deps
        run: npm ci
        working-directory: tests

      - name: Run unit tests (mock mode)
        run: npm test -- --testPathPattern="unit"
        working-directory: tests
        env:
          TEST_MODE: unit

  services-health:
    name: Services Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker services
        run: docker compose build
        env:
          COMPOSE_FILE: docker-compose.yml

  rust-check:
    name: Rust Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Rust syntax (no Solana toolchain needed)
        run: cargo check --manifest-path programs/solana-stablecoin-standard/Cargo.toml
        continue-on-error: true  # Solana BPF target not available in CI — check syntax only

      - name: Clippy lint
        run: cargo clippy --manifest-path programs/solana-stablecoin-standard/Cargo.toml -- -D warnings
        continue-on-error: true
