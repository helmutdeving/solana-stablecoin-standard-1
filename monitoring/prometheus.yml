global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "solana-stablecoin-standard"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sss-mint-burn"
    static_configs:
      - targets: ["mint-burn:3001"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "sss-event-listener"
    static_configs:
      - targets: ["event-listener:3002"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "sss-compliance"
    static_configs:
      - targets: ["compliance:3003"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "sss-oracle"
    static_configs:
      - targets: ["oracle:3004"]
    metrics_path: "/metrics"
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
